<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moonlight Local PDF Access Guide</title>
    <link rel="stylesheet" href="popup_style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img src="images/icon128.png" alt="Moonlight Icon" class="icon" />
        <div data-l10n-id="extName">
          Moonlight | AI Colleague for Research Papers
        </div>
      </div>
      <div class="content">
        <p data-l10n-id="toReadLocalPDFs">
          To read local PDFs with Moonlight, enable access to file URLs in the
          settings, and then reload the PDF.
        </p>
        <img
          src="images/allow_access_to_file_url.png"
          alt="Allow access to file URLs"
          class="image"
        />
        <br />
        <br />
        <button class="open-settings" data-l10n-id="openSettings">
          Open Settings
        </button>
        <button class="no-thanks" data-l10n-id="noThanks">No Thanks</button>
      </div>
      <div class="content contact">
        <span data-l10n-id="anyProblems"> Any problems? Email us at </span>
        <a href="mailto:moonlight@corca.ai">moonlight@corca.ai</a>
      </div>
    </div>
  </body>
  <script src="popup.js"></script>
</html>

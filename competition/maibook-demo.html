function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(text) {
  if (!text) return '';
  let html = esc(text);
  // Code blocks
  html = html.replace(/```([\s\S]*?)```/g, (m, c) => `<pre><code>${c.trim()}</code></pre>`);
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
  // Lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^[-•] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`);
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  // Clean up extra br around block elements
  html = html.replace(/<br>(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)<br>/g, '$1');
  html = html.replace(/<br>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<br>/g, '$1');
  html = html.replace(/<br>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<br>/g, '$1');
  return html;
}

  papers.forEach(p => {
    if (p.group_name) {
      counts[p.group_name] = (counts[p.group_name] || 0) + 1;
    } else {
      ungrouped++;
    }
  });
  return { counts, ungrouped };
}

function matchAIResponse(input) {
  const lower = input.toLowerCase();
  for (const pattern of aiResponsePatterns) {
    for (const kw of pattern.keywords) {
      if (lower.includes(kw.toLowerCase()) || input.includes(kw)) {
        return pattern.response;
      }
    }
  }
  return defaultAIResponse;
}

function renderAnnotationPanel() {
  const paperAnnotations = annotations.filter(a => a.paper_id === state.selectedPaperId);

    if (state.annotationFilterColor !== 'all' && a.color !== state.annotationFilterColor) return false;
    return true;

  const typeLabels = { highlight: '高亮', note: '笔记', comment: '评论' };

  return `
    <div class="flex flex-col flex-1 min-h-0">
      <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">

          `).join('')}
        </div>
        <div class="flex gap-1">
          ${['all','yellow','green','blue','pink'].map(c => `
            <button onclick="setAnnotationFilter('color','${c}')" class="px-2 py-1 text-xs rounded transition-colors flex items-center gap-1 ${state.annotationFilterColor === c ? 'bg-blue-100 text-blue-700 font-medium' : 'text-gray-500 hover:bg-gray-100'}">

          <div class="p-2.5 rounded-lg border border-gray-100 hover:border-gray-200 hover:shadow-sm transition-all cursor-pointer" onclick="jumpToPage(${a.page_number})">

      </div>
    </div>
  `;
}

          <span class="inline-block mt-1 px-1.5 py-0.5 text-xs rounded ${CATEGORY_COLORS[skill.category] || 'bg-gray-100 text-gray-500'}">${skill.category}</span>

        ` : ''}
      </div>
    </div>
  `;
}

// ===================== TOAST =====================

function showToast(msg) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 bg-gray-800 text-white text-sm rounded-lg shadow-lg z-[300]';
  toast.style.animation = 'fadeIn 0.2s ease-out';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

// ===================== ACTIONS =====================

function navigate(page) {
  state.currentPage = page;
  if (page !== 'reader') state.selectedPaperId = null;
  if (page !== 'discovery') { state.discoveryStep = 'input'; }
  if (page !== 'idealab') { state.ideaStep = 'input'; state.ideaViewDetail = null; }
  if (page !== 'meeting') { state.meetingStep = 'input'; state.meetingViewDetail = null; }
  render();
}

function selectGroup(group) {
  state.selectedGroup = group;
  render();
}

function openReader(paperId) {
  state.selectedPaperId = paperId;
  state.currentPage = 'reader';
  state.pageNumber = 1;
  state.scale = 1.0;
  state.readerPanel = 'chat';
  state.activeConversation = 'c1';
  state.summaryGenerated = false;
  state.summaryLoading = false;
  state.translateLoading = false;
  state.translatedText = null;
  render();
}

function adjustScale(delta) {
  state.scale = Math.max(0.5, Math.min(2.0, state.scale + delta));
  render();
}

function changePage(delta) {
  const paper = papers.find(p => p.id === state.selectedPaperId);
  if (!paper) return;
  const content = paperContent[paper.id] || defaultPaperContent;
  const numPages = content.pages.length;
  state.pageNumber = Math.max(1, Math.min(numPages, state.pageNumber + delta));
  render();
}

function jumpToPage(page) {
  state.pageNumber = page;
  render();
}

function togglePanel(panel) {
  state.readerPanel = state.readerPanel === panel ? null : panel;
  render();
}

function selectConversation(convId) {
  state.activeConversation = convId;
  render();
}

function handleChatSend() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text || state.isThinking) return;

  const conv = conversations.find(c => c.id === state.activeConversation);
  if (conv) {
    conv.messages.push({ role: 'user', content: text });
  }
  input.value = '';
  state.isThinking = true;
  render();

  setTimeout(() => {
    const response = matchAIResponse(text);
    if (conv) {
      conv.messages.push({ role: 'assistant', content: response });
    }
    state.isThinking = false;
    render();
  }, 1500);
}

function setAnnotationFilter(type, value) {
  if (type === 'type') state.annotationFilterType = value;
  else state.annotationFilterColor = value;
  render();
}

function generateSummary() {
  state.summaryLoading = true;
  render();
  setTimeout(() => {
    state.summaryLoading = false;
    state.summaryGenerated = true;
    render();
  }, 1800);
}

function translatePage() {
  state.translateLoading = true;
  state.translatedText = null;
  render();
  setTimeout(() => {
    state.translateLoading = false;
    state.translatedText = '主流的序列转导模型基于复杂的循环或卷积神经网络，包含编码器和解码器。表现最好的模型还通过注意力机制连接编码器和解码器。我们提出了一种新的简单网络架构——Transformer，完全基于注意力机制，彻底摒弃了循环和卷积。在两个机器翻译任务的实验中，这些模型在质量上更优，同时具有更好的并行性，所需训练时间显著减少。';
    render();
  }, 1500);
}

function installSkill(skillId) {
  state.installingSkill = skillId;
  render();
  setTimeout(() => {
    state.skills = state.skills.map(s =>
      s.id === skillId ? { ...s, installed: true, enabled: true } : s
    );
    state.installingSkill = null;
    showToast('技能安装成功');
    render();
  }, 1200);
}

function toggleSkill(skillId) {
  state.skills = state.skills.map(s =>
    s.id === skillId ? { ...s, enabled: !s.enabled } : s
  );
  render();
}

function showSkillDetailDialog(skillId) {
  state.showSkillDetail = skillId;
  render();
}

// ===================== DISCOVERY ACTIONS =====================

function toggleDiscoverySourcePaper(id) {
  const idx = state.discoverySourcePapers.indexOf(id);
  if (idx > -1) state.discoverySourcePapers.splice(idx, 1);
  else state.discoverySourcePapers.push(id);
}

function startDiscovery() {
  state.discoveryStep = 'loading';
  render();
  setTimeout(() => {
    state.discoveryResults = [...discoveryResultPool].sort((a,b) => b.relevance - a.relevance);
    state.discoverySelectedIds = [];
    state.discoveryStep = 'results';
    render();
  }, 2000);
}

function toggleDiscoverySelect(id) {
  const idx = state.discoverySelectedIds.indexOf(id);
  if (idx > -1) state.discoverySelectedIds.splice(idx, 1);
  else state.discoverySelectedIds.push(id);
  render();
}

function selectAllDiscovery() {
  if (state.discoverySelectedIds.length === state.discoveryResults.length) {
    state.discoverySelectedIds = [];
  } else {
    state.discoverySelectedIds = state.discoveryResults.map(r => r.id);
  }
  render();
}

function autoImportTopDiscovery(count) {
  state.discoverySelectedIds = state.discoveryResults.slice(0, count).map(r => r.id);
  render();
}

function importDiscoveryPapers() {
  const selected = state.discoveryResults.filter(r => state.discoverySelectedIds.includes(r.id));
  let imported = 0;
  selected.forEach(r => {
    if (!papers.find(p => p.title === r.title)) {
      papers.push({
        id: 'imp_' + r.id, title: r.title, authors: r.authors,
        abstract_text: r.abstract_text, year: r.year, journal: r.journal,
        doi: null, tags: r.tags, group_name: null, page_count: null,
        status: 'unread', reading_progress: 0, created_at: '2026-07-12'
      });
      imported++;
    }
  });
  showToast(`成功导入 ${imported} 篇论文到论文库`);
  resetDiscovery();
}

function resetDiscovery() {
  state.discoveryStep = 'input';
  state.discoveryKeyword = '';
  state.discoverySourcePapers = [];
  state.discoveryResults = [];
  state.discoverySelectedIds = [];
  render();
}

// ===================== IDEA LAB ACTIONS =====================

function startIdeaAnalysis() {
  state.ideaStep = 'analyzing';
  render();
  setTimeout(() => {
    state.ideaSimilarPapers = [...ideaSimilarPaperPool].sort((a,b) => b.similarity - a.similarity);
    state.ideaStep = 'similar';
    render();
  }, 2000);
}

function showIdeaUpgrades() {
  state.ideaUpgrades = [...ideaUpgradeTemplates];
  state.ideaSelectedUpgrades = [];
  state.ideaStep = 'upgrading';
  render();
}

function toggleIdeaUpgrade(idx) {
  const i = state.ideaSelectedUpgrades.indexOf(idx);
  if (i > -1) state.ideaSelectedUpgrades.splice(i, 1);
  else state.ideaSelectedUpgrades.push(idx);
  render();
}

function generateUpgradedIdea() {
  state.ideaStep = 'generating';
  render();
  setTimeout(() => {
    const selected = state.ideaSelectedUpgrades.map(i => state.ideaUpgrades[i]);
    const parts = selected.map(u => `### ${u.icon} ${u.type}\n${u.content}`);
    if (state.ideaCustomDirection.trim()) {
      parts.push(`### ✏️ 自定义方向\n${state.ideaCustomDirection}`);
    }
    const ideaText = state.ideaInput.slice(0, 60);
    state.ideaUpgradedContent = `基于您的原始创意，结合以下 ${parts.length} 个升级方向：\n\n${parts.join('\n\n')}\n\n---\n\n**升级后的创意**：\n\n在原始创意"${ideaText}..."的基础上，融合了${selected.map(s => s.type).join('、')}${state.ideaCustomDirection.trim() ? '及自定义' : ''}方向的增强，形成了一个更具创新性和可行性的研究方案。升级后的创意在保持核心思想的同时，拓展了应用边界并深化了理论基础。`;
    state.ideaStep = 'done';
    render();
  }, 1800);
}

function saveIdea() {
  const newIdea = {
    id: 'idea_' + Date.now(),
    title: state.ideaInput.slice(0, 30) + (state.ideaInput.length > 30 ? '...' : ''),
    description: state.ideaInput,
    created_at: '2026-07-12',
    similarity: state.ideaSimilarPapers[0]?.similarity || 0,
    similar_papers: state.ideaSimilarPapers,
    upgrades: state.ideaSelectedUpgrades.map(i => state.ideaUpgrades[i]),
    upgraded_content: state.ideaUpgradedContent,
  };
  savedIdeas.unshift(newIdea);
  showToast('创意已保存');
  resetIdeaWizard();
}

function viewIdeaDetail(id) {
  state.ideaViewDetail = id;
  render();
}

function resetIdeaWizard() {
  state.ideaStep = 'input';
  state.ideaInput = '';
  state.ideaSimilarPapers = [];
  state.ideaUpgrades = [];
  state.ideaSelectedUpgrades = [];
  state.ideaCustomDirection = '';
  state.ideaUpgradedContent = null;
  render();
}

// ===================== MEETING ACTIONS =====================

function setMeetingCount(type, delta) {
  if (type === 'intensive') state.meetingIntensiveCount = Math.max(1, Math.min(5, state.meetingIntensiveCount + delta));
  else state.meetingSkimCount = Math.max(0, Math.min(8, state.meetingSkimCount + delta));
  render();
}

function startMeetingGen() {
  state.meetingStep = 'loading';
  state.meetingProgress = '检索相关论文...';
  state.meetingProgressSteps = [];
  render();

  setTimeout(() => {
    if (state.currentPage !== 'meeting' || state.meetingStep !== 'loading') return;
    state.meetingProgressSteps.push('检索相关论文');
    state.meetingProgress = '精读 ' + state.meetingIntensiveCount + ' 篇核心论文...';
    render();
  }, 1000);

  setTimeout(() => {
    if (state.currentPage !== 'meeting' || state.meetingStep !== 'loading') return;
    state.meetingProgressSteps.push('精读');
    state.meetingProgress = '略读 ' + state.meetingSkimCount + ' 篇相关论文...';
    render();
  }, 2500);

  setTimeout(() => {
    if (state.currentPage !== 'meeting' || state.meetingStep !== 'loading') return;
    state.meetingProgressSteps.push('略读');
    state.meetingProgress = '生成演讲稿...';
    render();
  }, 3800);

  setTimeout(() => {
    if (state.currentPage !== 'meeting' || state.meetingStep !== 'loading') return;
    state.meetingProgressSteps.push('生成演讲稿');
    state.meetingProgress = '生成 PPT 大纲...';
    render();
  }, 5200);

  setTimeout(() => {
    if (state.currentPage !== 'meeting' || state.meetingStep !== 'loading') return;
    state.meetingProgressSteps.push('生成 PPT 大纲');
    state.meetingRetrievedPapers = [
      ...meetingPaperPool.intensive.slice(0, state.meetingIntensiveCount).map(p => ({...p, type:'intensive'})),
      ...meetingPaperPool.skim.slice(0, state.meetingSkimCount).map(p => ({...p, type:'skim'})),
    ];
    state.meetingSpeechDraft = savedMeetings[0].speech_draft;
    state.meetingPptOutline = savedMeetings[0].ppt_outline;
    state.meetingStep = 'done';
    state.meetingDetailTab = 'speech';
    render();
  }, 6500);
}

function saveMeeting() {
  const newMeeting = {
    id: 'mtg_' + Date.now(),
    topic: state.meetingTopic || '未命名组会',
    created_at: '2026-07-12',
    intensive_count: state.meetingIntensiveCount,
    skim_count: state.meetingSkimCount,
    papers: state.meetingRetrievedPapers,
    speech_draft: state.meetingSpeechDraft,
    ppt_outline: state.meetingPptOutline,
  };
  savedMeetings.unshift(newMeeting);
  showToast('组会记录已保存');
  resetMeetingWizard();
}

function viewMeetingDetail(id) {
  state.meetingViewDetail = id;
  state.meetingDetailTab = 'speech';
  render();
}

function resetMeetingWizard() {
  state.meetingStep = 'input';
  state.meetingTopic = '';
  state.meetingIntensiveCount = 2;
  state.meetingSkimCount = 3;
  state.meetingProgress = '';
  state.meetingProgressSteps = [];
  state.meetingSpeechDraft = null;
  state.meetingPptOutline = null;
  state.meetingRetrievedPapers = [];
  render();
}

// ===================== TEXT SELECTION =====================

function handleTextSelection(e) {
  if (state.currentPage !== 'reader') return;
  const readerArea = document.getElementById('reader-content-area');
  if (!readerArea) return;

  const selection = window.getSelection();
  if (!selection || selection.isCollapsed || !selection.rangeCount) {
    hideSelectionToolbar();
    return;
  }

  const text = selection.toString().trim();
  if (text.length === 0) {
    hideSelectionToolbar();
    return;
  }

  // Check if selection is within reader content
  const range = selection.getRangeAt(0);
  if (!readerArea.contains(range.commonAncestorContainer)) {
    hideSelectionToolbar();
    return;
  }

  const rect = range.getBoundingClientRect();
  showSelectionToolbar(rect, text);
}

function showSelectionToolbar(rect, text) {
  hideSelectionToolbar();
  const toolbar = document.createElement('div');
  toolbar.className = 'selection-toolbar flex items-center gap-0.5 bg-white rounded-lg shadow-xl border border-gray-200 px-1.5 py-1';
  toolbar.style.left = (rect.left + rect.width / 2 - 200) + 'px';
  toolbar.style.top = (rect.top - 44) + 'px';

  const colors = [
    { color: 'yellow', bg: 'bg-yellow-400' },
    { color: 'green', bg: 'bg-green-400' },
    { color: 'blue', bg: 'bg-blue-400' },
    { color: 'pink', bg: 'bg-pink-400' },
  ];

  toolbar.innerHTML = `
    ${colors.map(c => `
      <button onclick="highlightSelection('${c.color}')" class="w-7 h-7 rounded ${c.bg} hover:scale-110 transition-transform" title="${ANNOTATION_COLORS[c.color].label}高亮"></button>
    `).join('')}
    <div class="w-px h-5 bg-gray-200 mx-0.5"></div>
    <button onclick="selectionAction('note')" class="px-2 py-1 text-xs text-gray-600 hover:bg-gray-100 rounded flex items-center gap-1" title="添加笔记">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      笔记
    </button>
    <button onclick="selectionAction('comment')" class="px-2 py-1 text-xs text-gray-600 hover:bg-gray-100 rounded flex items-center gap-1" title="添加评论">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      评论
    </button>
    <button onclick="selectionAction('translate')" class="px-2 py-1 text-xs text-gray-600 hover:bg-gray-100 rounded flex items-center gap-1" title="翻译">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
      翻译
    </button>
    <button onclick="selectionAction('explain')" class="px-2 py-1 text-xs text-blue-600 hover:bg-blue-50 rounded flex items-center gap-1" title="AI 解释">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      解释
    </button>
  `;

  document.body.appendChild(toolbar);
}

function hideSelectionToolbar() {
  const toolbar = document.querySelector('.selection-toolbar');
  if (toolbar) toolbar.remove();
}

function highlightSelection(color) {
  const selection = window.getSelection();
  const text = selection.toString().trim();
  if (text) {
    showToast(`已添加${ANNOTATION_COLORS[color].label}高亮`);
  }
  selection.removeAllRanges();
  hideSelectionToolbar();
}

function selectionAction(action) {
  const selection = window.getSelection();
  const text = selection.toString().trim();
  if (!text) return;

  if (action === 'translate') {
    showToast('翻译中...');
    setTimeout(() => showToast('翻译结果：' + text.substring(0, 50) + '...（已翻译）'), 1000);
  } else if (action === 'explain') {
    showToast('AI 分析中...');
    setTimeout(() => showToast('已生成 AI 解释'), 1500);
  } else if (action === 'note') {
    showToast('笔记已保存');
  } else if (action === 'comment') {
    showToast('评论已添加');
  }
  selection.removeAllRanges();
  hideSelectionToolbar();
}

// ===================== MAIN RENDER =====================

function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderShell();
  // Scroll chat to bottom
  const chatMessages = document.getElementById('chat-messages');
  if (chatMessages) {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
}

// ===================== INIT =====================

document.addEventListener('mouseup', handleTextSelection);
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('.selection-toolbar')) {
    // Don't clear selection immediately, let mouseup handle it
  }
});

// Init: render the app
render();
</script>

function renderMarkdown(text) {
  if (!text) return '';
  let html = esc(text);
  // Code blocks
  html = html.replace(/```([\s\S]*?)```/g, (m, c) => `<pre><code>${c.trim()}</code></pre>`);
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
  // Lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^[-•] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`);
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  // Clean up extra br around block elements
  html = html.replace(/<br>(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)<br>/g, '$1');
  html = html.replace(/<br>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<br>/g, '$1');
  html = html.replace(/<br>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<br>/g, '$1');
  return html;
}

}

function getAllGroupNames() {
  const set = new Set(papers.map(p => p.group_name).filter(Boolean));
  state.customGroups.forEach(g => set.add(g));
  return Array.from(set).sort();
}

function matchAIResponse(input) {
  const lower = input.toLowerCase();
  for (const pattern of aiResponsePatterns) {
    for (const kw of pattern.keywords) {
      if (lower.includes(kw.toLowerCase()) || input.includes(kw)) {
        return pattern.response;
      }
    }
  }
  return defaultAIResponse;
}

function renderPage() {
  switch(state.currentPage) {

        <div class="flex-1 bg-gray-100 min-w-0 overflow-auto" id="reader-content-area">
          <div class="flex justify-center py-6 px-4">
            <div class="bg-white shadow-lg rounded-sm max-w-[680px] w-full px-16 py-12 font-serif" style="font-size: ${state.scale * 16}px; line-height: 1.8;">
              <div class="text-center mb-8">
                <h1 class="text-2xl font-semibold text-gray-900 mb-3" style="font-size: ${state.scale * 24}px;">${esc(content.title)}</h1>
                <p class="text-sm text-gray-600 mb-1" style="font-size: ${state.scale * 13}px;">${esc(content.authors)}</p>
                <p class="text-xs text-gray-400" style="font-size: ${state.scale * 11}px;">${esc(content.affiliation)}</p>
              </div>
              ${currentPage ? `
                <h2 class="text-lg font-semibold text-gray-800 mb-3 mt-6" style="font-size: ${state.scale * 18}px;">${esc(currentPage.heading)}</h2>
                ${currentPage.paragraphs.map(p => `<p class="text-gray-700 mb-3 text-justify" style="font-size: ${state.scale * 15}px; line-height: 1.85;">${p}</p>`).join('')}
              ` : ''}
              <div class="mt-12 pt-4 border-t border-gray-200 text-center text-xs text-gray-400">
                — ${state.pageNumber} / ${numPages} —
              </div>
            </div>
          </div>
        </div>
        <div class="border-l border-gray-200 bg-white flex flex-col shrink-0 panel-enter" style="width: ${state.readerPanel === 'chat' ? '429px' : '320px'}">
          ${renderReaderPanel()}
        </div>
      </div>
    </div>
  `;
}

function renderReaderPanel() {
  switch(state.readerPanel) {
    case 'chat': return renderChatPanel();
    case 'annotations': return renderAnnotationPanel();
    case 'summary': return renderSummaryPanel();
    case 'translate': return renderTranslatePanel();
    default: return renderChatPanel();
  }
}

function renderChatPanel() {
  const conv = conversations.find(c => c.id === state.activeConversation) || conversations[0];
  const messages = conv ? conv.messages : [];

  return `
    <div class="flex flex-col flex-1 min-h-0">
      <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
        <div class="flex items-center gap-1.5">
          <h2 class="text-sm font-semibold text-gray-800">AI 对话</h2>
          <button class="w-6 h-6 flex items-center justify-center text-sm border border-gray-200 rounded hover:bg-gray-50 text-gray-500 transition-colors" title="新建对话">+</button>
        </div>
        <button onclick="togglePanel(null)" class="w-6 h-6 flex items-center justify-center text-xs text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded transition-colors">×</button>
      </div>
      <div class="flex flex-1 min-h-0">
        <div class="w-36 border-r border-gray-200 bg-gray-50 flex flex-col shrink-0">
          <div class="flex-1 overflow-auto">
            ${conversations.map(c => `
              <div onclick="selectConversation('${c.id}')" class="group flex items-center justify-between px-3 py-2.5 text-xs cursor-pointer border-b border-gray-100 transition-colors ${c.id === state.activeConversation ? 'bg-blue-50 text-blue-700 font-medium border-l-2 border-l-blue-500' : 'text-gray-600 hover:bg-gray-100 border-l-2 border-l-transparent'}">
                <span class="truncate flex-1 min-w-0">${esc(c.title)}</span>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="flex-1 flex flex-col min-h-0 min-w-0">
          <div class="flex-1 overflow-auto p-3 space-y-3" id="chat-messages">
            ${messages.length === 0 ? '<p class="text-xs text-gray-400 text-center pt-6">可以询问关于这篇论文的问题</p>' : ''}
            ${messages.map(msg => `
              <div class="text-sm p-3 rounded-lg max-w-full break-words ${msg.role === 'user' ? 'bg-blue-50 text-blue-900 ml-4 shadow-sm' : 'bg-gray-50 text-gray-800 mr-4 shadow-sm'}">
                <div class="md-content">${renderMarkdown(msg.content)}</div>
              </div>
            `).join('')}
            ${state.isThinking ? `
              <div class="text-sm p-3 rounded-lg bg-gray-50 text-gray-400 mr-4 flex items-center gap-1.5">
                <span class="think-dot w-1.5 h-1.5 bg-gray-400 rounded-full inline-block"></span>
                <span class="think-dot w-1.5 h-1.5 bg-gray-400 rounded-full inline-block"></span>
                <span class="think-dot w-1.5 h-1.5 bg-gray-400 rounded-full inline-block"></span>
                <span class="ml-1 text-xs">思考中...</span>
              </div>
            ` : ''}
          </div>
          <div class="p-3 border-t border-gray-200 bg-white">
            <div class="flex gap-2">
              <input type="text" id="chat-input" placeholder="询问关于这篇论文的问题..." class="flex-1 px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" onkeydown="if(event.key==='Enter') handleChatSend()">
              <button onclick="handleChatSend()" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition-colors">发送</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderAnnotationPanel() {
  const paperAnnotations = annotations.filter(a => a.paper_id === state.selectedPaperId);
  const filtered = paperAnnotations.filter(a => {
    if (state.annotationFilterType !== 'all' && a.annotation_type !== state.annotationFilterType) return false;
    if (state.annotationFilterColor !== 'all' && a.color !== state.annotationFilterColor) return false;
    return true;
  });

  const typeLabels = { highlight: '高亮', note: '笔记', comment: '评论' };

  return `
    <div class="flex flex-col flex-1 min-h-0">
      <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
        <h2 class="text-sm font-semibold text-gray-800">标注</h2>
        <button onclick="togglePanel(null)" class="w-6 h-6 flex items-center justify-center text-xs text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded transition-colors">×</button>
      </div>
      <div class="px-3 py-2 border-b border-gray-200 space-y-2">
        <div class="flex gap-1">
          ${['all','highlight','note','comment'].map(t => `
            <button onclick="setAnnotationFilter('type','${t}')" class="px-2 py-1 text-xs rounded transition-colors ${state.annotationFilterType === t ? 'bg-blue-100 text-blue-700 font-medium' : 'text-gray-500 hover:bg-gray-100'}">${t === 'all' ? '所有类型' : typeLabels[t]}</button>
          `).join('')}
        </div>
        <div class="flex gap-1">
          ${['all','yellow','green','blue','pink'].map(c => `
            <button onclick="setAnnotationFilter('color','${c}')" class="px-2 py-1 text-xs rounded transition-colors flex items-center gap-1 ${state.annotationFilterColor === c ? 'bg-blue-100 text-blue-700 font-medium' : 'text-gray-500 hover:bg-gray-100'}">
              ${c === 'all' ? '所有颜色' : `<span class="w-2.5 h-2.5 rounded-full ${ANNOTATION_COLORS[c].dot}"></span>${ANNOTATION_COLORS[c].label}`}
            </button>
          `).join('')}
        </div>
      </div>
      <div class="flex-1 overflow-auto p-3 space-y-2">
        <p class="text-xs text-gray-400 mb-1">共 ${filtered.length} 条</p>
        ${filtered.length === 0 ? '<p class="text-xs text-gray-400 text-center py-8">当前筛选条件下没有标注。</p>' : ''}
        ${filtered.map(a => `
          <div class="p-2.5 rounded-lg border border-gray-100 hover:border-gray-200 hover:shadow-sm transition-all cursor-pointer" onclick="jumpToPage(${a.page_number})">
            <div class="flex items-center gap-2 mb-1.5">
              <span class="px-1.5 py-0.5 text-[10px] rounded ${a.annotation_type === 'highlight' ? 'bg-yellow-50 text-yellow-600' : a.annotation_type === 'note' ? 'bg-blue-50 text-blue-600' : 'bg-pink-50 text-pink-600'}">${typeLabels[a.annotation_type]}</span>
              <span class="w-2 h-2 rounded-full ${ANNOTATION_COLORS[a.color].dot}"></span>
              <span class="text-[10px] text-gray-400 ml-auto">第 ${a.page_number} 页</span>
            </div>
            ${a.selected_text ? `<p class="text-xs text-gray-500 italic mb-1 line-clamp-2">"${esc(a.selected_text)}"</p>` : ''}
            ${a.content ? `<p class="text-xs text-gray-700 mt-1">${esc(a.content)}</p>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

  return `
    <div class="flex flex-col flex-1 min-h-0">
      <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
        <h2 class="text-sm font-semibold text-gray-800">AI 摘要</h2>
        <button onclick="togglePanel(null)" class="w-6 h-6 flex items-center justify-center text-xs text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded transition-colors">×</button>
      </div>
      <div class="flex-1 overflow-auto p-4">
        ${state.summaryLoading ? `

        ` : state.summaryGenerated ? `

              <h3 class="text-xs font-semibold text-blue-700 mb-1">研究问题</h3>
              <p class="text-sm text-gray-700">如何在不使用循环和卷积神经网络的情况下实现高质量的序列转导？传统 RNN 和 CNN 在处理长序列时存在并行化困难和长距离依赖问题。</p>

            <div class="p-3 bg-amber-50 rounded-lg">

                <li>WMT 2014 英德翻译：28.4 BLEU（提升 2 BLEU）</li>
                <li>WMT 2014 英法翻译：41.8 BLEU（新 SOTA）</li>

              <p class="text-sm text-gray-700">Transformer 开创了纯注意力架构的先河，成为现代 NLP 和深度学习的基础架构，后续的 BERT、GPT 系列均建立在此架构之上。</p>
            </div>

        ` : `
          <div class="flex flex-col items-center justify-center py-12 text-center">
            <svg class="w-12 h-12 text-gray-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <p class="text-sm text-gray-500 mb-1">根据标题和摘要生成论文的 AI 摘要</p>
            <p class="text-xs text-gray-400 mb-4">点击下方按钮一键生成结构化摘要</p>
            <button onclick="generateSummary()" class="px-4 py-2 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700 transition-colors">生成摘要</button>

  return `
    <div class="flex flex-col flex-1 min-h-0">
      <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
        <h2 class="text-sm font-semibold text-gray-800">页面翻译</h2>
        <button onclick="togglePanel(null)" class="w-6 h-6 flex items-center justify-center text-xs text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded transition-colors">×</button>

        ` : `
          <div class="flex flex-col items-center justify-center py-12 text-center">
            <svg class="w-12 h-12 text-gray-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>

// ===================== RENDER: PAPER DETAIL =====================

function renderPaperDetail() {
  const paper = papers.find(p => p.id === state.selectedPaperId);
  if (!paper) return '<div class="flex items-center justify-center h-full text-gray-400">未找到论文</div>';

  const tags = parseTags(paper.tags);
  const enabledSkills = state.skills.filter(s => s.installed && s.enabled);

  const statusOptions = [
    { value: 'unread', label: '未读' },
    { value: 'reading', label: '阅读中' },
    { value: 'read', label: '已读' },
  ];

  function formatDate(d) {
    try { return new Date(d).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' }); }
    catch { return d; }
  }

  return `
    <div class="flex-1 overflow-auto page-enter">
      <!-- Top bar -->
      <div class="flex items-center justify-between px-6 py-3 border-b border-gray-200 bg-white sticky top-0 z-10">
        <button onclick="navigate('library')" class="flex items-center gap-1 text-sm text-gray-600 hover:text-gray-900 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          返回论文库
        </button>
        <div class="flex items-center gap-2">
          <button onclick="exportPaperBibtex('${paper.id}')" class="px-3 py-1.5 text-sm border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">导出 BibTeX</button>
          <button onclick="openReader('${paper.id}')" class="px-4 py-1.5 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">打开 PDF</button>
        </div>
      </div>

      <div class="max-w-3xl mx-auto px-6 py-8">
        <!-- Title -->
        <h1 class="text-2xl font-bold text-gray-900 leading-tight">${esc(paper.title)}</h1>
        ${paper.authors ? `<p class="mt-3 text-base text-gray-600">${esc(paper.authors)}</p>` : ''}

        <!-- Journal / Year / DOI -->
        <div class="flex items-center gap-2 mt-2 text-sm text-gray-500">
          ${paper.journal ? `<span>${esc(paper.journal)}</span>` : ''}
          ${paper.journal && paper.year ? '<span>/</span>' : ''}
          ${paper.year ? `<span>${paper.year}</span>` : ''}
          ${(paper.journal || paper.year) && paper.doi ? '<span>/</span>' : ''}
          ${paper.doi ? `<a href="https://doi.org/${esc(paper.doi)}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 hover:underline">${esc(paper.doi)}</a>` : ''}
        </div>

        <!-- Status & tags -->
        <div class="flex flex-wrap items-center gap-3 mt-4">
          <div class="flex items-center gap-1.5">
            <span class="text-xs text-gray-500 font-medium">状态:</span>
            <select onchange="updatePaperStatus('${paper.id}', this.value)" class="px-2 py-1 text-xs border rounded-md text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-blue-300">
              ${statusOptions.map(o => `<option value="${o.value}" ${paper.status === o.value ? 'selected' : ''}>${o.label}</option>`).join('')}
            </select>
          </div>
          ${paper.group_name ? `<span class="px-2 py-0.5 text-xs bg-green-50 text-green-700 rounded-full">${esc(paper.group_name)}</span>` : ''}
          ${tags.map(t => `<span class="px-2 py-0.5 text-xs bg-blue-50 text-blue-700 rounded-full">${esc(t)}</span>`).join('')}
        </div>

        <!-- Abstract -->
        ${paper.abstract_text ? `
          <div class="mt-6">
            <h2 class="text-sm font-semibold text-gray-900 mb-2">摘要</h2>
            <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-line">${esc(paper.abstract_text)}</p>
          </div>
        ` : ''}

        <!-- Metadata -->
        <div class="mt-8 bg-white border border-gray-200 rounded-lg p-4">
          <h2 class="text-sm font-semibold text-gray-900 mb-3">元数据</h2>
          <div class="space-y-2 text-sm text-gray-600">
            <div class="flex"><span class="w-32 shrink-0 text-gray-400">导入时间</span><span>${formatDate(paper.created_at)}</span></div>
            ${paper.page_count != null ? `<div class="flex"><span class="w-32 shrink-0 text-gray-400">页数</span><span>${paper.page_count} 页</span></div>` : ''}
            <div class="flex"><span class="w-32 shrink-0 text-gray-400">阅读进度</span><span>${Math.round((paper.reading_progress ?? 0) * 100)}%</span></div>
          </div>
        </div>

        <!-- Skill Pipeline -->
        <div class="mt-6">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-semibold text-gray-900">AI 技能分析</h2>
            <button onclick="startPipeline('${paper.id}')" ${state.pipelineStatus === 'running' ? 'disabled' : ''} class="px-4 py-1.5 text-xs font-medium bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors flex items-center gap-1.5">
              ${state.pipelineStatus === 'running' ? `
                <svg class="w-3.5 h-3.5 spinner" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                分析中...
              ` : state.pipelineStatus === 'complete' ? '重新分析' : '运行技能分析'}
            </button>
          </div>

          ${state.pipelineStatus === 'idle' && state.pipelineSlots.length === 0 ? `
            <div class="bg-white border border-gray-200 rounded-lg p-8 text-center">
              <div class="flex justify-center mb-3">
                <svg class="w-12 h-12 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              </div>
              <p class="text-sm text-gray-500 mb-1">点击"运行技能分析"使用 AI 技能阅读论文</p>
              <p class="text-xs text-gray-400">已启用 ${enabledSkills.length} 个技能：${enabledSkills.map(s => s.name).join('、')}</p>
            </div>
          ` : ''}

          ${state.pipelineStatus === 'running' && state.pipelineSlots.length === 0 ? `
            <div class="bg-white border border-gray-200 rounded-lg p-8 text-center">
              <div class="flex justify-center mb-3">
                <div class="flex gap-1">
                  <span class="w-2.5 h-2.5 bg-blue-400 rounded-full think-dot"></span>
                  <span class="w-2.5 h-2.5 bg-blue-400 rounded-full think-dot"></span>
                  <span class="w-2.5 h-2.5 bg-blue-400 rounded-full think-dot"></span>
                </div>
              </div>
              <p class="text-sm text-gray-500">正在提取论文文本并准备 AI 分析...</p>
            </div>
          ` : ''}

          ${state.pipelineSlots.length > 0 ? `
            <div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
              <!-- Tabs -->
              <div class="flex border-b border-gray-200 overflow-x-auto">
                ${state.pipelineSlots.map(s => `
                  <button onclick="setActiveSkillTab('${s.skill_id}')" class="px-4 py-2.5 text-xs font-medium whitespace-nowrap border-b-2 transition-colors ${state.activeSkillTab === s.skill_id ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}">
                    ${esc(s.skill_name)}
                    ${s.error ? '<span class="ml-1 text-red-400">!</span>' : ''}
                    ${!s.done && !s.error ? '<span class="ml-1.5 inline-block w-2 h-2 bg-blue-400 rounded-full animate-pulse align-middle"></span>' : ''}
                  </button>
                `).join('')}
              </div>
              <!-- Content -->
              <div class="p-5">
                ${state.pipelineSlots.map(s => {
                  if (s.skill_id !== state.activeSkillTab) return '';
                  if (s.error) return `<div class="text-sm text-red-600"><p class="font-medium">出错了</p><p class="mt-1 text-xs">${esc(s.error)}</p></div>`;
                  if (!s.content && !s.done) return `
                    <div class="flex items-center justify-center py-8">
                      <div class="flex gap-1">
                        <span class="w-2 h-2 bg-blue-400 rounded-full think-dot"></span>
                        <span class="w-2 h-2 bg-blue-400 rounded-full think-dot"></span>

function exportData() {
  const data = {
    version: '0.9.3',
    exported_at: new Date().toISOString(),
    papers: papers,
    annotations: annotations,
    skills: state.skills.filter(s => s.installed),
    conversations: conversations,
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'maibook-backup-' + Date.now() + '.maibook';
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出（' + papers.length + ' 篇论文，' + annotations.length + ' 条标注）');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.maibook,.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.papers || !Array.isArray(data.papers)) {
          showToast('导入失败：文件格式不正确（需要 .maibook 格式）');
          return;
        }
        let importedPapers = 0;
        let importedAnnotations = 0;
        data.papers.forEach(function(p) {
          if (!papers.find(function(existing) { return existing.id === p.id || existing.title === p.title; })) {
            papers.push(p);
            importedPapers++;
          }
        });
        if (data.annotations && Array.isArray(data.annotations)) {
          data.annotations.forEach(function(a) {
            if (!annotations.find(function(existing) { return existing.id === a.id; })) {
              annotations.push(a);
              importedAnnotations++;
            }
          });
        }
        showToast('成功导入 ' + importedPapers + ' 篇论文，' + importedAnnotations + ' 条标注');
        render();
      } catch(err) {
        showToast('导入失败：文件格式不正确（需要 .maibook 格式）');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ===================== TOAST =====================

function showToast(msg) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 bg-gray-800 text-white text-sm rounded-lg shadow-lg z-[300]';
  toast.style.animation = 'fadeIn 0.2s ease-out';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

function confirmAction(message, onConfirm) {
  state.confirmAction = { message: message, onConfirm: onConfirm };
  render();
}

function dismissConfirm() {
  state.confirmAction = null;
  render();
}

function executeConfirm() {
  if (state.confirmAction && state.confirmAction.onConfirm) {
    state.confirmAction.onConfirm();
  }
  state.confirmAction = null;
  render();
}

function renderConfirmDialog() {
  return `
    <div class="fixed inset-0 z-[200] flex items-center justify-center bg-black/30" onclick="dismissConfirm()">
      <div class="bg-white rounded-xl shadow-2xl p-6 w-[400px] max-w-[90vw]" onclick="event.stopPropagation()">

          <label class="block text-sm font-medium text-gray-600 mb-2">输入检索关键词</label>
          <textarea oninput="state.discoveryKeyword=this.value" placeholder="例如：Transformer 架构在计算机视觉中的应用..." class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none min-h-24">${esc(state.discoveryKeyword)}</textarea>
          <div class="flex flex-wrap gap-2 mt-2">
            ${['Transformer', '大语言模型', '多模态', '强化学习', '图神经网络'].map(t => `<button onclick="state.discoveryKeyword='${t}'; render()" class="px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded-full hover:bg-blue-50 hover:text-blue-600 transition-colors">${t}</button>`).join('')}
          </div>
        </div>
      ` : `
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-2">从论文库选择参考论文（AI 将分析这些论文并检索相似文献）</label>
          ${(() => {
            const groupedPapers = {};
            papers.forEach(p => {
              const g = p.group_name || '__ungrouped__';
              if (!groupedPapers[g]) groupedPapers[g] = [];
              groupedPapers[g].push(p);
            });
            const groupNames = Object.keys(groupedPapers);
            return `
              <div class="space-y-2 max-h-64 overflow-auto border border-gray-200 rounded-lg p-2">
                ${groupNames.map(gName => {
                  const groupPapers = groupedPapers[gName];
                  const selectedCount = groupPapers.filter(p => state.discoverySourcePapers.includes(p.id)).length;
                  const allSelected = selectedCount === groupPapers.length;
                  const collapsed = state.discoveryCollapsedGroups.includes(gName);
                  const displayName = gName === '__ungrouped__' ? '未分组' : gName;
                  return `
                    <div class="border border-gray-100 rounded-lg overflow-hidden">
                      <div class="flex items-center gap-2 px-2.5 py-2 bg-gray-50 cursor-pointer hover:bg-gray-100 transition-colors" onclick="toggleDiscoveryGroupCollapse('${esc(gName)}')">
                        <svg class="w-3.5 h-3.5 transition-transform shrink-0 ${collapsed ? '' : 'rotate-90'}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                        <input type="checkbox" ${allSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleDiscoveryGroupSelect('${esc(gName)}')" class="rounded shrink-0">
                        <span class="text-sm font-medium text-gray-700">${esc(displayName)}</span>
                        <span data-group-selected="${esc(gName)}" class="text-xs text-gray-400 ml-auto">${selectedCount}/${groupPapers.length} 篇</span>
                      </div>
                      ${!collapsed ? `
                        <div class="divide-y divide-gray-50">
                          ${groupPapers.map(p => `
                            <label class="flex items-center gap-2 px-2.5 py-1.5 hover:bg-gray-50 cursor-pointer">
                              <input type="checkbox" ${state.discoverySourcePapers.includes(p.id) ? 'checked' : ''} onchange="toggleDiscoverySourcePaper('${p.id}')" class="rounded shrink-0">
                              <span class="text-sm text-gray-700 truncate flex-1">${esc(p.title)}</span>
                              <span class="text-xs text-gray-400 shrink-0">${p.year || ''}</span>
                            </label>
                          `).join('')}
                        </div>
                      ` : ''}
                    </div>
                  `;
                }).join('')}
              </div>
              <p class="text-xs text-gray-400 mt-1">已选择 ${state.discoverySourcePapers.length} 篇论文</p>
            `;
          })()}
        </div>
      `}
      <div class="mt-5 flex justify-end">
        <button onclick="startDiscovery()" class="px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
          开始检索
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>
      </div>
      ${statusBar}
    </div>
  `;
}

// ===================== RENDER: IDEA LAB =====================

function renderIdeaLab() {
  let wizardContent = '';
  if (state.ideaStep === 'analyzing') wizardContent = renderIdeaAnalyzing();
  else if (state.ideaStep === 'similar') wizardContent = renderIdeaSimilar();
  else if (state.ideaStep === 'upgrading') wizardContent = renderIdeaUpgrading();
  else if (state.ideaStep === 'generating') wizardContent = renderIdeaGenerating();
  else if (state.ideaStep === 'done') wizardContent = renderIdeaDone();

  const showSplit = state.ideaStep !== 'input';

  // Right panel content
  let rightContent = '';
  if (state.ideaStep === 'input') {
    rightContent = `
      <div>
        <h2 class="text-sm font-semibold text-gray-700 mb-3">已保存的创意</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          ${savedIdeas.length > 0 ? savedIdeas.map(idea => renderIdeaCard(idea)).join('') : '<p class="text-sm text-gray-400 col-span-3 text-center py-8">暂无保存的创意</p>'}
        </div>
      </div>
    `;
  } else {
    rightContent = `
      ${wizardContent}
      ${state.ideaStep === 'done' ? `
        <div>
          <h2 class="text-sm font-semibold text-gray-700 mb-3">已保存的创意</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            ${savedIdeas.map(idea => renderIdeaCard(idea)).join('')}
          </div>
        </div>
      ` : ''}
    `;
  }

  return `
    <div class="h-full flex flex-col bg-gray-50 page-enter">
      <div class="flex items-center justify-between px-6 py-3 border-b border-gray-200 bg-white shrink-0">
        <div>
          <h1 class="text-lg font-bold text-gray-900">创意工坊</h1>
          <p class="text-xs text-gray-500 mt-0.5">AI 辅助创意发现与升级</p>
        </div>
        ${showSplit ? `<button onclick="resetIdeaWizard()" class="px-3 py-1.5 text-sm font-medium text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">取消/返回</button>` : ''}
      </div>
      <div class="flex-1 overflow-hidden flex">
        <div class="w-[400px] shrink-0 border-r border-gray-200 overflow-auto p-6 bg-white">
          ${renderIdeaInput()}
          ${showSplit ? `
            <div class="mt-4 bg-blue-50 border border-blue-100 rounded-lg p-4">
              <h3 class="text-xs font-semibold text-blue-600 uppercase mb-2">原始创意</h3>
              <p class="text-sm text-gray-700 whitespace-pre-wrap">${esc(state.ideaInput)}</p>
            </div>
          ` : ''}
        </div>
        <div class="flex-1 overflow-auto p-6">
          <div class="max-w-3xl mx-auto space-y-6">
            ${rightContent}
          </div>
        </div>
      </div>
    </div>
    ${state.ideaViewDetail ? renderIdeaDetailModal() : ''}
    ${renderIdeaTrash()}
  `;
}

  return `
    <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
      <div class="flex items-center gap-2 mb-4">
        <span class="px-3 py-1 text-xs font-medium rounded-full ${alertColor}">${alertText}</span>
        <span class="text-xs text-gray-400">最高相似度: ${maxSim}%</span>
      </div>
      <div class="space-y-3 mb-5">
        ${state.ideaSimilarPapers.map(p => {
          const simColor = p.similarity > 75 ? 'bg-red-400' : p.similarity > 60 ? 'bg-orange-400' : 'bg-green-400';
          const simTextColor = p.similarity > 75 ? 'text-red-600' : p.similarity > 60 ? 'text-orange-600' : 'text-green-600';
          return `
            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-gray-800 line-clamp-1">${esc(p.title)}</p>
                <p class="text-xs text-gray-400">${esc(p.authors)} · ${p.year}</p>
              </div>
              <div class="flex items-center gap-2 shrink-0">
                <div class="w-16 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                  <div class="h-full rounded-full ${simColor}" style="width: ${p.similarity}%"></div>
                </div>
                <span class="text-xs font-medium ${simTextColor}">${p.similarity}%</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="flex justify-end">
        <button onclick="showIdeaUpgrades()" class="px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">

        </button>

}

  const showSplit = state.meetingStep !== 'input';

  let rightContent = '';
  if (state.meetingStep === 'input') {
    rightContent = `
      <div>
        <h2 class="text-sm font-semibold text-gray-700 mb-3">历史组会记录</h2>

// ===================== ACTIONS =====================

function navigate(page) {
  state.currentPage = page;
  if (page !== 'reader' && page !== 'paperDetail') state.selectedPaperId = null;
  if (page !== 'discovery') { state.discoveryStep = 'input'; }
  if (page !== 'idealab') { state.ideaStep = 'input'; state.ideaViewDetail = null; }
  if (page !== 'meeting') { state.meetingStep = 'input'; state.meetingViewDetail = null; }
  if (page !== 'about') { state.aboutModal = null; }
  render();
}

function selectGroup(group) {
  state.selectedGroup = group;
  render();
}

function dissolveGroup(groupName) {
  confirmAction('确定解散分组 "' + groupName + '"？组内论文将变为未分组。', function() {
    papers.forEach(p => {
      if (p.group_name === groupName) p.group_name = null;
    });
    state.customGroups = state.customGroups.filter(g => g !== groupName);
    if (state.selectedGroup === groupName) state.selectedGroup = null;
    showToast('已解散分组 "' + groupName + '"');
    render();
  });
}

function openCreateGroupDialog() {
  state.newGroupDialogOpen = true;
  state.newGroupName = '';
  render();
}

function cancelCreateGroup() {
  state.newGroupDialogOpen = false;
  state.newGroupName = '';
  render();
}

function setNewGroupName(v) { state.newGroupName = v; }

function confirmCreateGroup() {
  const name = state.newGroupName.trim();
  if (!name) { showToast('请输入分组名称'); return; }
  const all = getAllGroupNames();
  if (all.includes(name)) { showToast('该分组已存在'); return; }
  state.customGroups.push(name);
  state.newGroupDialogOpen = false;
  state.newGroupName = '';
  state.selectedGroup = name;
  showToast('已创建分组 "' + name + '"');
  render();
}

function renderCreateGroupDialog() {
  return `
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/30" onclick="cancelCreateGroup()">
      <div class="bg-white rounded-xl shadow-xl p-5 w-[400px] max-w-[90vw]" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-gray-800">新建分组</h3>
          <button onclick="cancelCreateGroup()" class="w-7 h-7 flex items-center justify-center rounded-md hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-500 mb-1.5">分组名称</label>
          <input type="text" value="${esc(state.newGroupName)}" oninput="setNewGroupName(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();confirmCreateGroup();}" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 transition-shadow" placeholder="输入分组名称" autofocus>
        </div>
        <div class="flex justify-end gap-2 pt-3 border-t border-gray-100">
          <button onclick="cancelCreateGroup()" class="px-4 py-1.5 text-sm text-gray-600 hover:bg-gray-100 rounded transition-colors">取消</button>
          <button onclick="confirmCreateGroup()" class="px-4 py-1.5 text-sm font-medium bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">创建</button>
        </div>
      </div>
    </div>
  `;
}

function openReader(paperId) {
  state.selectedPaperId = paperId;
  const paper = papers.find(p => p.id === paperId);
  if (paper && paper.status === 'unread') {
    paper.status = 'reading';
    if (!paper.reading_progress) paper.reading_progress = 0.01;
  }
  state.currentPage = 'reader';
  state.pageNumber = 1;
  state.scale = 1.0;
  state.readerPanel = 'chat';
  state.activeConversation = 'c1';
  state.summaryGenerated = false;
  state.summaryLoading = false;
  state.translateLoading = false;
  state.translatedText = null;
  render();
}

function openPaperDetail(paperId) {
  state.selectedPaperId = paperId;
  state.currentPage = 'paperDetail';
  state.pipelineStatus = 'idle';
  state.pipelineSlots = [];
  state.activeSkillTab = '';
  render();
}

function setActiveSkillTab(skillId) {
  state.activeSkillTab = skillId;
  render();
}

function updatePaperStatus(paperId, newStatus) {
  const paper = papers.find(p => p.id === paperId);
  if (paper) {

function startPipeline(paperId) {
  const paper = papers.find(p => p.id === paperId);
  if (!paper) return;
  state.pipelineStatus = 'running';
  state.pipelineSlots = [];
  state.activeSkillTab = '';
  render();

  const results = mockPipelineResults[paperId] || null;
  const enabledSkills = state.skills.filter(s => s.installed && s.enabled);
  let slotsToAdd;
  if (results) {
    const applicableResults = results.filter(r =>
      enabledSkills.some(es => es.id === r.skill_id)
    );
    slotsToAdd = applicableResults.length > 0 ? applicableResults : results;
  } else {
    slotsToAdd = enabledSkills.map(s => ({
      skill_id: s.id,
      skill_name: s.name,
      content: '## ' + s.name + '\n\n正在为当前论文生成' + s.name + '结果。这是 ' + s.name + ' 技能的默认输出。\n\n建议在设置中配置 API 密钥后，获取更精准的 AI 分析结果。'
    }));
  }

  // Simulate progressive skill loading
  let delay = 600;
  slotsToAdd.forEach((result, idx) => {
    // Add slot header (skill-start)
    setTimeout(() => {
      state.pipelineSlots.push({
        skill_id: result.skill_id,
        skill_name: result.skill_name,
        content: '',
        error: null,
        done: false,
      });
      if (idx === 0) state.activeSkillTab = result.skill_id;
      render();
    }, delay);

    // Fill content (skill-done)
    setTimeout(() => {
      const slot = state.pipelineSlots.find(s => s.skill_id === result.skill_id);
      if (slot) {
        slot.content = result.content;
        slot.done = true;
      }
      render();
    }, delay + 1200);

    delay += 800;
  });

  // Mark complete
  setTimeout(() => {
    state.pipelineStatus = 'complete';
    render();
  }, delay + 500);
}

function handleAIRecommend() {
  state.recommending = true;
  render();
  setTimeout(() => {
    const ungroupedPapers = papers.filter(p => !p.group_name || p.group_name === '');
    // Simulate AI recommending groups based on paper tags and content
    state.recommendations = ungroupedPapers.map(p => {
      let suggestedGroup = null;
      if (p.tags) {
        const tagStr = p.tags.join(' ').toLowerCase();
        if (tagStr.includes('transformer') || tagStr.includes('深度学习') || tagStr.includes('resnet') || tagStr.includes('nlp')) {
          suggestedGroup = '深度学习';
        } else if (tagStr.includes('gpt') || tagStr.includes('大语言模型') || tagStr.includes('llm')) {
          suggestedGroup = '大语言模型';
        } else if (tagStr.includes('扩散') || tagStr.includes('diffusion') || tagStr.includes('生成')) {
          suggestedGroup = '生成模型';
        } else if (tagStr.includes('clip') || tagStr.includes('多模态') || tagStr.includes('multimodal')) {
          suggestedGroup = '多模态';
        } else if (tagStr.includes('强化学习') || tagStr.includes('ppo') || tagStr.includes('reinforcement')) {
          suggestedGroup = '强化学习';
        }
      }
      return { title: p.title, group: suggestedGroup };
    });
    const edits = {};
    state.recommendations.forEach(r => { edits[r.title] = r.group; });
    state.editedRecs = edits;
    state.recommending = false;
    state.recommendOpen = true;
    render();
  }, 1800);
}

    });

  }, 800);
}

function parsePptOutlineToSlides(outline) {
  const slides = [];
  const sections = outline.split(/^### /m);
  sections.shift();
  sections.forEach(section => {
    const lines = section.trim().split('\n');
    const title = lines[0].trim();
    const content = lines.slice(1)
      .filter(l => l.trim())
      .map(l => l.replace(/^[-•\d+\.]+\s*/, '').trim());
    slides.push({ title, content });
  });
  return slides;
}

function generatePPTHTML(topic, slides) {
  const slidesHTML = slides.map((s, i) => `
    <section class="slide ${i === 0 ? 'title-slide' : ''}" id="slide-${i}">
      <h1>${s.title}</h1>
      <ul>${s.content.map(c => `<li>${c}</li>`).join('')}</ul>
    </section>
  `).join('');

  return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>${topic} - 组会PPT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
  .slide { width: 100vw; height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 80px; }
  .slide.active { display: flex; }
  .slide h1 { font-size: 2.2rem; margin-bottom: 2rem; color: #1e3a5f; text-align: center; }
  .slide ul { font-size: 1.4rem; line-height: 2.2; list-style: none; }
  .slide ul li::before { content: "\\2022"; color: #2563eb; font-weight: bold; margin-right: 12px; }
  .slide:nth-child(even) { background: #f8fafc; }
  .slide:nth-child(odd) { background: #ffffff; }
  .nav { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; align-items: center; gap: 12px; background: white; padding: 8px 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .nav button { padding: 6px 14px; cursor: pointer; border: 1px solid #d1d5db; border-radius: 4px; background: white; font-size: 14px; }
  .nav button:hover { background: #f3f4f6; }
  .slide-num { font-size: 14px; color: #6b7280; }
  .title-slide { background: linear-gradient(135deg, #1e3a5f, #2563eb) !important; }
  .title-slide h1 { color: white !important; }
</style>
</head>
<body>
  ${slidesHTML}
  <div class="nav">
    <button onclick="prevSlide()">&#9664;</button>
    <span class="slide-num" id="slide-num">1 / ${slides.length}</span>
    <button onclick="nextSlide()">&#9654;</button>
  </div>
  <script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    if (slides.length > 0) slides[0].classList.add('active');
    function showSlide(n) {
      currentSlide = Math.max(0, Math.min(slides.length - 1, n));
      slides.forEach((s, i) => s.classList.toggle('active', i === currentSlide));
      document.getElementById('slide-num').textContent = (currentSlide + 1) + ' / ' + slides.length;
    }
    function nextSlide() { showSlide(currentSlide + 1); }
    function prevSlide() { showSlide(currentSlide - 1); }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });
  <\/script>
</body>
</html>`;
}

function downloadMeetingPPT() {
  const topic = state.meetingTopic || '组会演示';
  const slides = parsePptOutlineToSlides(state.meetingPptOutline || '');
  if (slides.length === 0) {
    showToast('PPT 大纲为空，无法导出');
    return;
  }
  const html = generatePPTHTML(topic, slides);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = topic + '-PPT.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('PPT 已下载（HTML 格式，可用浏览器打开演示）');
}

// ===================== TEXT SELECTION =====================

let currentSelectionRange = null;
let currentSelectionText = '';

function handleTextSelection(e) {
  if (state.currentPage !== 'reader') return;
  // Don't interfere if clicking on toolbar or popup
  if (e.target.closest('.selection-toolbar') || e.target.closest('.selection-popup')) return;

  const readerArea = document.getElementById('reader-content-area');
  if (!readerArea) return;

  // Use setTimeout to let selection finalize
  setTimeout(() => {
    const selection = window.getSelection();
    if (!selection || selection.isCollapsed || !selection.rangeCount) {
      hideSelectionToolbar();
      return;
    }

    const text = selection.toString().trim();
    if (text.length === 0) {
      hideSelectionToolbar();
      return;
    }

    const range = selection.getRangeAt(0);
    if (!readerArea.contains(range.commonAncestorContainer)) {
      hideSelectionToolbar();
      return;
    }

    // Store reference for actions
    currentSelectionRange = range.cloneRange();
    currentSelectionText = text;
    showSelectionToolbar(range.getBoundingClientRect(), text);
  }, 10);
}

function showSelectionToolbar(rect, text) {
  hideSelectionToolbar();
  const toolbar = document.createElement('div');
  toolbar.className = 'selection-toolbar flex items-center gap-0.5 bg-white rounded-lg shadow-xl border border-gray-200 px-1.5 py-1';

  toolbar.onmousedown = (e) => e.preventDefault();

  const colors = [

    { color: 'blue', bg: 'bg-blue-400' },
    { color: 'pink', bg: 'bg-pink-400' },
  ];

  toolbar.innerHTML = `
    ${colors.map(c => `
      <button onclick="highlightSelection('${c.color}')" class="w-7 h-7 rounded ${c.bg} hover:scale-110 transition-transform" title="${ANNOTATION_COLORS[c.color].label}高亮"></button>
    `).join('')}
    <div class="w-px h-5 bg-gray-200 mx-0.5"></div>
    <button onclick="selectionAction('note')" class="px-2 py-1 text-xs text-gray-600 hover:bg-gray-100 rounded flex items-center gap-1" title="添加笔记">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>

    </button>

  `;

function hideSelectionToolbar() {
  const toolbar = document.querySelector('.selection-toolbar');
  if (toolbar) toolbar.remove();
}

function hideSelectionPopup() {
  const popup = document.querySelector('.selection-popup');
  if (popup) popup.remove();
}

function highlightSelection(color) {
  if (!currentSelectionRange || !currentSelectionText) return;
  const annId = 'a' + Date.now();

  try {
    const range = currentSelectionRange;
    const mark = document.createElement('mark');
    mark.className = 'hl-' + color;
    mark.dataset.aid = annId;

    // Use extractContents + insertNode to handle cross-element selections
    const fragment = range.extractContents();
    mark.appendChild(fragment);
    range.insertNode(mark);
  } catch (e) {
    // Fallback: just show toast if DOM manipulation fails
  }

  // Save annotation
  const newAnnotation = {
    id: annId,
    paper_id: state.selectedPaperId,
    annotation_type: 'highlight',
    page_number: state.pageNumber,
    color: color,
    selected_text: currentSelectionText,
    content: null,
  };
  annotations.push(newAnnotation);

  showToast(`已添加${ANNOTATION_COLORS[color].label}高亮`);
  window.getSelection().removeAllRanges();
  currentSelectionRange = null;
  currentSelectionText = '';
  hideSelectionToolbar();
}

function selectionAction(action) {
  if (!currentSelectionText) return;

  if (action === 'translate') {
    showTranslatePopup(currentSelectionRange.getBoundingClientRect());
  } else if (action === 'explain') {
    showExplainPopup(currentSelectionRange.getBoundingClientRect());
  } else if (action === 'note') {
    showNotePopup(currentSelectionRange.getBoundingClientRect(), 'note');
  } else if (action === 'comment') {
    showNotePopup(currentSelectionRange.getBoundingClientRect(), 'comment');
  }
  hideSelectionToolbar();
}

    <div class="flex justify-end gap-2 mt-2">
      <button onclick="hideSelectionPopup()" class="px-3 py-1 text-xs text-gray-500 hover:bg-gray-100 rounded">取消</button>
      <button onclick="saveNoteComment('${type}')" class="px-3 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700">保存</button>
    </div>
  `;
  document.body.appendChild(popup);
  setTimeout(() => {
    const input = document.getElementById('note-input');
    if (input) input.focus();
  }, 50);
}

function saveNoteComment(type) {
  const input = document.getElementById('note-input');
  if (!input || !input.value.trim()) {
    hideSelectionPopup();
    return;
  }

  const annId = 'a' + Date.now();
  const newAnnotation = {
    id: annId,
    paper_id: state.selectedPaperId,
    annotation_type: type,
    page_number: state.pageNumber,
    color: type === 'note' ? 'blue' : 'pink',
    selected_text: currentSelectionText,
    content: input.value.trim(),
  };
  annotations.push(newAnnotation);

  // Also apply visual highlight
  if (currentSelectionRange) {
    try {
      const mark = document.createElement('mark');
      mark.className = 'hl-' + (type === 'note' ? 'blue' : 'pink');
      mark.dataset.aid = annId;
      const fragment = currentSelectionRange.extractContents();
      mark.appendChild(fragment);
      currentSelectionRange.insertNode(mark);
    } catch (e) { /* ignore */ }
  }

  showToast(type === 'note' ? '笔记已保存' : '评论已添加');
  window.getSelection().removeAllRanges();
  currentSelectionRange = null;
  currentSelectionText = '';
  hideSelectionPopup();
}

function generateMockTranslation(text) {
  // Simple mock: for demo, prefix with translated label
  const translations = {
    'Attention Is All You Need': '注意力机制就是你所需要的',
    'Abstract': '摘要',
    'The dominant sequence transduction models': '主流的序列转导模型',
    'based on complex recurrent or convolutional neural networks': '基于复杂的循环或卷积神经网络',
  };
  let result = text;
  for (const [en, zh] of Object.entries(translations)) {
    result = result.replace(new RegExp(en, 'gi'), zh);
  }
  // If no known phrases matched, return a generic mock translation
  if (result === text) {
    return '【翻译结果】' + text.substring(0, 100) + (text.length > 100 ? '...' : '') + '\n\n（此为演示翻译，实际应用中会调用翻译 API 生成完整中文译文。）';
  }
  return result;
}

function generateMockExplanation(text) {
  const lower = text.toLowerCase();
  if (lower.includes('attention') || lower.includes('self-attention')) {
    return '## AI 解释\n\n**自注意力机制（Self-Attention）**\n\n自注意力是 Transformer 的核心创新。对于序列中的每个位置，它计算与所有其他位置的关联权重，然后加权求和得到该位置的输出。\n\n**公式**：`Attention(Q, K, V) = softmax(Q·K^T / √d_k) · V`\n\n**关键点**：\n- Q（Query）：当前位置在"寻找"什么\n- K（Key）：其他位置"提供"什么\n- V（Value）：其他位置的实际内容\n- 除以 √d_k 是为了控制点积方差，防止 softmax 饱和';
  }
  if (lower.includes('multi-head') || lower.includes('多头')) {
    return '## AI 解释\n\n**多头注意力（Multi-Head Attention）**\n\n使用多组并行的注意力头（论文中 h=8），每组在不同的表示子空间中学习不同类型的依赖关系。\n\n**优势**：\n- 不同头可以关注不同类型的关系（语法、语义、长距离依赖等）\n- 增加模型表达能力\n- 计算成本与单头注意力相当（因为每个头维度降低）';
  }
  if (lower.includes('positional') || lower.includes('position') || lower.includes('位置')) {
    return '## AI 解释\n\n**位置编码（Positional Encoding）**\n\n由于自注意力机制本身不包含位置信息（对所有位置一视同仁），需要额外注入顺序信息。\n\n论文使用正弦/余弦函数：\n- 偶数维度：sin(pos / 10000^(2i/d))\n- 奇数维度：cos(pos / 10000^(2i/d))\n\n**优势**：可以外推到训练时未见过的更长序列';
  }
  return '## AI 解释\n\n**选中内容分析**\n\n这段内容涉及论文中的关键概念。AI 会根据上下文提供详细解释，包括：\n\n1. **概念定义**：该术语或方法的核心含义\n2. **技术细节**：具体的实现方式和数学表达\n3. **上下文关联**：与论文其他部分的关系\n\n建议结合论文原文和 AI 技能分析（摘要、深度解释）进行更全面的理解。';
}

function reapplyReaderAnnotations() {
  if (state.currentPage !== 'reader' || !state.selectedPaperId) return;
  const readerArea = document.getElementById('reader-content-area');
  if (!readerArea) return;

  const paperAnnotations = annotations.filter(a =>
    a.paper_id === state.selectedPaperId &&
    a.page_number === state.pageNumber &&
    a.selected_text
  );

  paperAnnotations.forEach(ann => {
    // Skip annotations already in DOM (e.g., hardcoded in paperContent)
    if (readerArea.querySelector('mark[data-aid="' + ann.id + '"]')) return;
    // Also skip the initial hardcoded annotations that match by ID pattern
    if (readerArea.querySelector('mark[data-annotation-id="' + ann.id + '"]')) return;

    const walker = document.createTreeWalker(
      readerArea, NodeFilter.SHOW_TEXT, null, false
    );

    let textNode;
    while ((textNode = walker.nextNode())) {
      // Skip text already inside a mark tag
      if (textNode.parentElement && textNode.parentElement.tagName === 'MARK') continue;

      const text = textNode.nodeValue;
      const idx = text.indexOf(ann.selected_text);
      if (idx !== -1) {
        try {
          const range = document.createRange();
          range.setStart(textNode, idx);
          range.setEnd(textNode, idx + ann.selected_text.length);

          const mark = document.createElement('mark');
          mark.className = 'hl-' + ann.color;
          mark.dataset.aid = ann.id;
          range.surroundContents(mark);
        } catch (e) {
          // Cross-element match, try extract+insert
          try {
            const range2 = document.createRange();
            range2.setStart(textNode, idx);
            range2.setEnd(textNode, idx + ann.selected_text.length);
            const mark2 = document.createElement('mark');
            mark2.className = 'hl-' + ann.color;
            mark2.dataset.aid = ann.id;
            const fragment = range2.extractContents();
            mark2.appendChild(fragment);
            range2.insertNode(mark2);
          } catch (e2) { /* skip */ }
        }
        break; // Only wrap first occurrence
      }
    }
  });
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderShell();
  // Scroll chat to bottom
  const chatMessages = document.getElementById('chat-messages');
  if (chatMessages) {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
  // Reapply dynamic annotations in reader
  reapplyReaderAnnotations();
}

    hideSelectionPopup();
  }
});
